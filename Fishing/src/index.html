<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>釣りゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="game-screen">
            
            <div id="ui-top" class="ui-layer">
                <div id="reeling-ui" class="reeling-ui-container hidden">
                    <div class="gauge-outline">
                        <div id="gauge-bar"></div>
                    </div>
                    <p class="guide-text">左クリック長押しで巻け！</p>
                </div>
            </div>

            <div id="ui-right" class="ui-layer">
                <div class="score-panel">
                    <span class="score-label">現在のポイント</span><br>
                    <span id="current-points" class="score-value">0</span>
                </div>
            </div>

            <div id="main-content">
                <div id="screen-start" class="screen start-screen-content">
                    <h1 class="title">FISHING GAME</h1>
                    
                    <div class="instructions">
                        <p style="margin-top: 0; color: #60a5fa; font-weight: bold;">【遊び方】</p>
                        <p>① <b>スペースキー</b>でルアーを投げる</p>
                        <p>② 「！」が出たら素早く<b>左クリック</b></p>
                        <p>③ <b>左クリック長押し</b>でゲージを保ち魚を釣り上げろ！</p>
                    </div>

                    <div class="button-group">
                        <button id="start-btn">スタート</button>
                        <button id="quit-btn-start" class="btn-secondary quit-btn">ゲームを終わる</button>
                    </div>
                </div>

                <div id="screen-aim" class="screen hidden">
                    <p class="status-msg">スペースキーで投げる！</p>
                </div>

                <div id="screen-waiting" class="screen hidden">
                    <div id="bite-icon" class="hidden">！</div>
                    <p class="status-msg">魚を待っています...</p>
                </div>

                <div id="screen-success" class="screen hidden">
                    <h2 id="result-text" class="result-title">ゲット！</h2>
                    <img id="fish-img" src="" class="fish-display-img">
                    <div class="button-group">
                        <button id="next-btn">ネクストステージ</button>
                        <button id="quit-btn-success" class="btn-secondary quit-btn">ゲームを終わる</button>
                    </div>
                </div>

                <div id="screen-fail" class="screen hidden">
                    <h2 class="result-title">逃げられた…</h2>
                    <div class="button-group" style="margin-top: 40px;">
                        <button id="retry-btn">リトライ</button>
                        <button id="quit-btn-fail" class="btn-secondary quit-btn">ゲームを終わる</button>
                    </div>
                </div>

                <img id="rod-display" src="images/rod_idle.png" class="rod-img">
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
