<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIT.Sports – ホーム</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>

<div class="home-screen">

  <div class="home-logo">
    <span class="logo-ait">AIT.</span><span class="logo-sports">Sports</span>
  </div>

  <div class="map-container" id="mapContainer">

    <img class="map-bg" src="../img/map_bg.png" alt="Campus Map"
         onerror="this.style.display='none'; document.getElementById('mapContainer').classList.add('no-image')">

    <a class="callout" href="../Fishing/src/index.html"
       style="--x: 30%; --y: 50%;"
       data-sport="fishing">
      <div class="callout__bubble">
        <div class="callout__icon">
          <img src="../img/icon_fishing.png" alt="釣り"
               onerror="this.outerHTML='<span class=\'icon-emoji\'>🎣</span>'">
        </div>
        <div class="callout__label">釣り</div>
      </div>
    </a>

    <a class="callout" href="../Shooting/index.html"
       style="--x: 49%; --y: 50%;"
       data-sport="shooting">
      <div class="callout__bubble">
        <div class="callout__icon">
          <img src="../img/icon_shooting.png" alt="射的"
               onerror="this.outerHTML='<span class=\'icon-emoji\'>🔫</span>'">
        </div>
        <div class="callout__label">射撃</div>
      </div>
    </a>

    <a class="callout" href="../Bowling/index.html"
       style="--x: 65%; --y: 50%;"
       data-sport="bowling">
      <div class="callout__bubble">
        <div class="callout__icon">
          <img src="../img/icon_bowling.png" alt="ボウリング"
               onerror="this.outerHTML='<span class=\'icon-emoji\'>🎳</span>'">
        </div>
        <div class="callout__label">ボウリング</div>
      </div>
    </a>

    <a class="callout" href="../Archery/index.html"
       style="--x: 78%; --y: 18%;"
       data-sport="archery">
      <div class="callout__bubble">
        <div class="callout__icon">
          <img src="../img/icon_archery.png" alt="アーチェリー"
               onerror="this.outerHTML='<span class=\'icon-emoji\'>🏹</span>'">
        </div>
        <div class="callout__label">アーチェリー</div>
      </div>
    </a>

  </div><button class="wii-score-btn" onclick="openScoreModal()">
    <span class="wii-score-icon">📊</span>
    <span class="wii-score-label">スコア確認</span>
  </button>

  <div id="scoreModal" class="wii-modal">
    <div class="wii-modal-box">
      <div class="wii-modal-header">
        <h2>🏆 ユーザー別ランク一覧</h2>
      </div>
      
      <div class="wii-modal-body" id="scoreModalBody">
        </div>
      
      <div class="wii-modal-footer">
        <button class="wii-modal-close-btn" onclick="closeScoreModal()">閉じる</button>
      </div>
    </div>
  </div>

</div><script src="home.js"></script>
</body>
</html>
