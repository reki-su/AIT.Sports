<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIT.Sports – ホーム</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>

<div class="home-screen">

  <!-- AIT.Sports badge (top-left) -->
  <div class="home-logo">
    <span class="logo-ait">AIT.</span><span class="logo-sports">Sports</span>
  </div>

  <!-- Full-screen map container (position:relative so callouts can be absolute-positioned) -->
  <div class="map-container" id="mapContainer">

    <!-- Background map image -->
    <img class="map-bg" src="../img/map_bg.png" alt="Campus Map"
         onerror="this.style.display='none'; document.getElementById('mapContainer').classList.add('no-image')">

    <!--
      ╔═══════════════════════════════════════════════════════════╗
      ║  CALLOUT TEMPLATE                                         ║
      ║  .callout  →  outer wrapper  (position:absolute)         ║
      ║    ├─ .callout__bubble  →  the white speech bubble        ║
      ║    │    ├─ .callout__icon  →  <img> sport icon            ║
      ║    │    └─ .callout__label →  sport name text             ║
      ║    └─ (tail is a CSS ::after pseudo-element)              ║
      ║                                                           ║
      ║  Position each sport by setting CSS custom props:         ║
      ║    style="--x: 28%; --y: 62%;"                            ║
      ╚═══════════════════════════════════════════════════════════╝
    -->

    <!-- 釣り (Fishing) -->
    <a class="callout" href="../src/Fishing/index.html"
       style="--x: 30%; --y: 50%;"
       data-sport="fishing">
      <div class="callout__bubble">
        <div class="callout__icon">
          <img src="../img/icon_fishing.png" alt="釣り"
               onerror="this.outerHTML='<span class=\'icon-emoji\'>🎣</span>'">
        </div>
        <div class="callout__label">釣り</div>
      </div>
    </a>

    <!-- 射撃 (Shooting) -->
    <a class="callout" href="../Shooting/index.html"
       style="--x: 49%; --y: 50%;"
       data-sport="shooting">
      <div class="callout__bubble">
        <div class="callout__icon">
          <img src="../img/icon_shooting.png" alt="射的"
               onerror="this.outerHTML='<span class=\'icon-emoji\'>🔫</span>'">
        </div>
        <div class="callout__label">射撃</div>
      </div>
    </a>

    <!-- ボウリング (Bowling) -->
    <a class="callout" href="../Bowling/index.html"
       style="--x: 65%; --y: 50%;"
       data-sport="bowling">
      <div class="callout__bubble">
        <div class="callout__icon">
          <img src="../img/icon_bowling.png" alt="ボウリング"
               onerror="this.outerHTML='<span class=\'icon-emoji\'>🎳</span>'">
        </div>
        <div class="callout__label">ボウリング</div>
      </div>
    </a>

    <!-- アーチェリー (Archery) -->
    <a class="callout" href="../Archery/index.html"
       style="--x: 78%; --y: 18%;"
       data-sport="archery">
      <div class="callout__bubble">
        <div class="callout__icon">
          <img src="../img/icon_archery.png" alt="アーチェリー"
               onerror="this.outerHTML='<span class=\'icon-emoji\'>🏹</span>'">
        </div>
        <div class="callout__label">アーチェリー</div>
      </div>
    </a>

  </div><!-- /map-container -->

  <!-- Score button (bottom-right) -->
  <a class="score-btn" href="score.html">
    <span class="score-btn__icon">🏆</span>
    <span class="score-btn__label">スコア</span>
  </a>

</div><!-- /home-screen -->

<script src="home.js"></script>
</body>
</html>
