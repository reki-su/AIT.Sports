<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛知工業大学 射的ゲーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#1a1a1a;overflow:hidden;}
  #sg3{width:100vw;height:100vh;position:relative;overflow:hidden;font-family:sans-serif;}
  #sg3 canvas{display:block;width:100%;height:100%;cursor:none;}
  #hud{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:10px 16px;z-index:10;pointer-events:none;}
  .hb{background:rgba(255,255,255,0.15);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:5px 14px;text-align:center;}
  .hl{font-size:9px;color:rgba(255,255,255,0.6);letter-spacing:2px;text-transform:uppercase;}
  .hv{font-family:'Share Tech Mono',monospace;font-size:20px;color:#fff;line-height:1.3;}
  #timebar-bg{position:absolute;bottom:0;left:0;width:100%;height:5px;background:rgba(0,0,0,0.3);z-index:10;}
  #timebar{height:5px;background:#e8c84a;transition:width 0.95s linear;width:100%;}
  #crosshair{position:absolute;pointer-events:none;z-index:11;top:50%;left:50%;transform:translate(-50%,-50%);}
  #overlay{position:absolute;inset:0;background:rgba(20,15,10,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;padding:20px;}
  #overlay h2{font-family:'Share Tech Mono',monospace;font-size:26px;color:#e8c84a;letter-spacing:4px;margin-bottom:6px;}
  #overlay p{font-size:13px;color:rgba(255,220,150,0.6);letter-spacing:1px;margin-bottom:16px;}
  #result{font-family:'Share Tech Mono',monospace;font-size:17px;color:#fff;margin-bottom:14px;display:none;}
  #startbtn{font-family:'Share Tech Mono',monospace;font-size:13px;padding:11px 30px;background:transparent;border:1px solid #e8c84a;color:#e8c84a;border-radius:4px;cursor:pointer;letter-spacing:2px;}
  #startbtn:hover{background:#e8c84a;color:#1a1000;}
  #how-to-play{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;}
  .htp-card{background:rgba(255,255,255,0.06);border:1px solid rgba(232,200,74,0.2);border-radius:8px;padding:14px 16px;width:150px;text-align:center;}
  .htp-icon{font-size:26px;margin-bottom:8px;}
  .htp-title{font-family:'Share Tech Mono',monospace;font-size:11px;color:#e8c84a;letter-spacing:1px;margin-bottom:6px;}
  .htp-desc{font-size:11px;color:rgba(255,220,150,0.55);line-height:1.6;}
  #score-table{margin-bottom:20px;border-collapse:collapse;width:100%;max-width:380px;}
  #score-table th{font-family:'Share Tech Mono',monospace;font-size:10px;color:#e8c84a;letter-spacing:1px;padding:6px 12px;border-bottom:1px solid rgba(232,200,74,0.2);text-align:left;}
  #score-table td{font-size:12px;color:rgba(255,220,150,0.7);padding:6px 12px;}
  #score-table tr:not(:last-child) td{border-bottom:1px solid rgba(255,255,255,0.05);}
  .ring-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .back-btn{position:absolute;bottom:20px;left:20px;font-family:'Share Tech Mono',monospace;font-size:13px;padding:9px 20px;background:transparent;border:1px solid rgba(232,200,74,0.5);color:#e8c84a;border-radius:4px;cursor:pointer;letter-spacing:1px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .back-btn:hover{background:rgba(232,200,74,0.12);}
  .float-txt{position:absolute;font-family:'Share Tech Mono',monospace;font-size:14px;pointer-events:none;z-index:15;animation:floatUp 0.8s ease-out forwards;font-weight:bold;}
  @keyframes floatUp{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-36px);}}
  .ripple{position:absolute;border-radius:50%;pointer-events:none;border:2px solid rgba(255,200,80,0.8);animation:rip 0.5s ease-out forwards;}
  @keyframes rip{from{opacity:1;transform:scale(0.2);}to{opacity:0;transform:scale(2.8);}}
</style>
</head>
<body>
<div id="sg3">
  <canvas id="c3"></canvas>
  <div id="hud">
    <div class="hb"><div class="hl">Score</div><div class="hv" id="sc">0</div></div>
    <div class="hb"><div class="hl">Combo</div><div class="hv" id="cb">x1</div></div>
    <div class="hb"><div class="hl">Time</div><div class="hv" id="tm">30</div></div>
  </div>
  <svg id="crosshair" width="32" height="32">
    <circle cx="16" cy="16" r="12" fill="none" stroke="#e8c84a" stroke-width="1.2" opacity="0.85"/>
    <line x1="16" y1="3" x2="16" y2="9" stroke="#e8c84a" stroke-width="1.5"/>
    <line x1="16" y1="23" x2="16" y2="29" stroke="#e8c84a" stroke-width="1.5"/>
    <line x1="3" y1="16" x2="9" y2="16" stroke="#e8c84a" stroke-width="1.5"/>
    <line x1="23" y1="16" x2="29" y2="16" stroke="#e8c84a" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="1.8" fill="#e8c84a"/>
  </svg>

  <div id="timebar-bg"><div id="timebar"></div></div>
  <div id="overlay">
    <h2>AIT RANGE</h2>
    <p id="guide">愛知工業大学キャンパス射的ゲーム</p>

    <div id="how-to-play">
      <div class="htp-card">
        <div class="htp-icon">🖱️</div>
        <div class="htp-title">視点操作</div>
        <div class="htp-desc">マウスを動かすと視点が上下左右に回転する</div>
      </div>
      <div class="htp-card">
        <div class="htp-icon">🎯</div>
        <div class="htp-title">射撃</div>
        <div class="htp-desc">画面中央の照準を的に合わせてクリックで射撃</div>
      </div>
      <div class="htp-card">
        <div class="htp-icon">⚡</div>
        <div class="htp-title">コンボ</div>
        <div class="htp-desc">連続ヒットでコンボ倍率が上がりスコアが増加</div>
      </div>
      <div class="htp-card">
        <div class="htp-icon">⏱️</div>
        <div class="htp-title">制限時間</div>
        <div class="htp-desc">30秒間でできるだけ高いスコアを狙え</div>
      </div>
    </div>

    <table id="score-table">
      <tr>
        <th>的の色</th>
        <th>ヒット時の基本点</th>
        <th>コンボ倍率</th>
      </tr>
      <tr>
        <td><span class="ring-dot" style="background:#ffee00;"></span>中心（黄）</td>
        <td>当たった部分に関わらず10点</td>
        <td>コンボ×10点</td>
      </tr>
      <tr>
        <td><span class="ring-dot" style="background:#ff2222;"></span>赤リング</td>
        <td>—</td>
        <td>コンボ継続</td>
      </tr>
      <tr>
        <td><span class="ring-dot" style="background:#3366cc;"></span>青リング</td>
        <td>—</td>
        <td>コンボ継続</td>
      </tr>
      <tr>
        <td><span class="ring-dot" style="background:#888;"></span>外れ（MISS）</td>
        <td>0点</td>
        <td>コンボリセット</td>
      </tr>
    </table>

    <div id="result"></div>
    <button id="startbtn">START</button>
    <a class="back-btn" href="../../Home/home.html">← ホームに戻る</a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

const PHOTO_LEFT   = "";
const PHOTO_RIGHT  = "";
const PHOTO_TOP    = "";
const PHOTO_BOTTOM = "";
// ============================================================

const root = document.getElementById("sg3");
const canvas = document.getElementById("c3");
let W, H;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
// フォグなし

const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 200);
camera.position.set(0, 1.65, 0);

function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
}

// --- ライティング ---
scene.add(new THREE.AmbientLight(0xfff5e0, 0.8));
const sunLight = new THREE.DirectionalLight(0xfff0cc, 2.0);
sunLight.position.set(12, 18, 8);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 80;
sunLight.shadow.camera.left = -30;
sunLight.shadow.camera.right = 30;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -20;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);
scene.add(new THREE.DirectionalLight(0xaaccff, 0.4)).position.set(-8, 5, -5);

// --- スカイボックス ---
// 写真が設定されていればテクスチャ、なければプレースホルダー色を使用
function makeSkySide(photoPath, fallbackColor){
  if(photoPath && photoPath !== ""){
    const tex = new THREE.TextureLoader().load(photoPath);
    return new THREE.MeshBasicMaterial({map: tex, side: THREE.BackSide});
  }
  return new THREE.MeshBasicMaterial({color: fallbackColor, side: THREE.BackSide});
}

const skyMaterials = [
  makeSkySide(PHOTO_RIGHT,  0x87CEEB), // +X 右
  makeSkySide(PHOTO_LEFT,   0x82C4E8), // -X 左
  makeSkySide(PHOTO_TOP,    0x6EB8E8), // +Y 上（空）
  makeSkySide(PHOTO_BOTTOM, 0x5a8a3c), // -Y 下
  makeSkySide(PHOTO_FRONT,  0x7CBFE0), // +Z 背面（カメラ後ろ）
  makeSkySide(PHOTO_BACK,   0x78BBDC), // -Z 正面（的がある方向）
];
const skyBox = new THREE.Mesh(new THREE.BoxGeometry(180, 180, 180), skyMaterials);
scene.add(skyBox);

// --- 地面（芝生） ---
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100, 100),
  new THREE.MeshLambertMaterial({color: 0x5a8a3c})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// --- 通路（石畳） ---
const path = new THREE.Mesh(
  new THREE.PlaneGeometry(6, 80),
  new THREE.MeshLambertMaterial({color: 0xb0a090})
);
path.rotation.x = -Math.PI/2;
path.position.set(0, 0.01, -25);
path.receiveShadow = true;
scene.add(path);

// ボックス生成ヘルパー
function box(w,h,d, x,y,z, col, ry=0){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color:col})
  );
  m.position.set(x,y,z);
  m.rotation.y = ry;
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

// --- ベンチ・木なし ---

// --- 的 ---
function makeTarget(){
  const group = new THREE.Group();
  [{r:0.55,col:0xffffff},{r:0.44,col:0x222222},{r:0.33,col:0x3366cc},{r:0.22,col:0xff2222},{r:0.11,col:0xffee00}].forEach(({r,col},i)=>{
    const mesh = new THREE.Mesh(
      new THREE.CylinderGeometry(r,r,0.04,32),
      new THREE.MeshLambertMaterial({color:col})
    );
    mesh.rotation.x = Math.PI/2;
    mesh.position.z = i*0.012;
    group.add(mesh);
  });
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.035,0.04,2.2,8),
    new THREE.MeshLambertMaterial({color:0x7a5230})
  );
  pole.position.y = -1.35;
  group.add(pole);
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,0.12,0.3),
    new THREE.MeshLambertMaterial({color:0x5a3a10})
  );
  base.position.y = -2.5;
  group.add(base);
  scene.add(group);
  return group;
}

let targets=[], score=0, timeLeft=30, combo=1, running=false, timerInt=null;

function spawnTarget(){
  const t = makeTarget();
  const depth = -12 - Math.random()*16;
  const x = (Math.random()-0.5)*10;
  const y = 0.8 + Math.random()*0.8;
  t.position.set(x, y, depth);
  const spd = 0.008 + Math.min(combo*0.003, 0.025);
  const ang = Math.random()*Math.PI*2;
  t.userData = {vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd*0.4};
  targets.push(t);
}

function removeTarget(t){
  scene.remove(t);
  targets = targets.filter(x=>x!==t);
}

function startGame(){
  targets.forEach(t=>scene.remove(t)); targets=[];
  score=0; timeLeft=30; combo=1; running=true;
  document.getElementById("sc").textContent="0";
  document.getElementById("cb").textContent="x1";
  document.getElementById("tm").textContent="30";
  document.getElementById("tm").style.color="#fff";
  document.getElementById("timebar").style.width="100%";
  document.getElementById("overlay").style.display="none";
  for(let i=0;i<3;i++) spawnTarget();
  clearInterval(timerInt);
  timerInt = setInterval(()=>{
    timeLeft--;
    document.getElementById("tm").textContent=timeLeft;
    document.getElementById("timebar").style.width=(timeLeft/30*100)+"%";
    if(timeLeft<=5) document.getElementById("tm").style.color="#ff6644";
    if(timeLeft<=0){clearInterval(timerInt);endGame();}
  },1000);
}

function endGame(){
  running=false;
  targets.forEach(t=>scene.remove(t)); targets=[];
  document.getElementById("result").style.display="block";
  document.getElementById("result").textContent="スコア: "+score+" ポイント";
  document.getElementById("startbtn").textContent="RETRY";
  document.querySelector("#overlay p").textContent="ゲーム終了！";
  document.getElementById("overlay").style.display="flex";
  document.querySelector(".back-btn").style.display="inline-flex";
}

let particles3d=[];
function spawnParticles(pos){
  for(let i=0;i<10;i++){
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.04,4,4),
      new THREE.MeshBasicMaterial({color:0xffcc44,transparent:true})
    );
    mesh.position.copy(pos);
    const vel = new THREE.Vector3(
      (Math.random()-0.5)*0.12,
      Math.random()*0.1,
      (Math.random()-0.5)*0.12
    );
    scene.add(mesh);
    particles3d.push({mesh,vel,life:1});
  }
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

root.addEventListener("click",(e)=>{
  if(!running) return;
  mouse.x = 0;
  mouse.y = 0;
  raycaster.setFromCamera(mouse,camera);
  let hit=false;
  for(const t of targets){
    const meshes=[];
    t.traverse(c=>{if(c.isMesh) meshes.push(c);});
    if(raycaster.intersectObjects(meshes).length>0){
      hit=true;
      const pts=Math.round(combo*10);
      score+=pts; combo++;
      document.getElementById("sc").textContent=score;
      document.getElementById("cb").textContent="x"+combo;
      spawnParticles(t.position.clone());
      addRipple(W/2, H/2);

      addFloatText("+"+pts+(combo>2?" COMBO!":""), W/2, H/2-30, "#ffcc00");
      removeTarget(t);
      spawnTarget();
      if(targets.length<3) spawnTarget();
      break;
    }
  }
  if(!hit){
    combo=1;
    document.getElementById("cb").textContent="x1";
    addFloatText("MISS", W/2, H/2-30, "#ff4444");
  }
});

function addRipple(x,y){
  const el=document.createElement("div");
  el.className="ripple";
  el.style.cssText="left:"+(x-30)+"px;top:"+(y-30)+"px;width:60px;height:60px;";
  root.appendChild(el);
  setTimeout(()=>el.remove(),600);
}

function addFloatText(txt,x,y,col){
  const el=document.createElement("div");
  el.className="float-txt";
  el.textContent=txt;
  el.style.cssText="left:"+(x-20)+"px;top:"+(y-20)+"px;color:"+col+";";
  root.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

let yaw=0, pitch=0.15;  // 少し下向きに初期化して地面が見えるようにする
const SENS = 0.0025;

// マウス差分で視点操作（初期位置に関係なく動く）
root.addEventListener("mousemove",(e)=>{
  if(!running) return;
  yaw   -= e.movementX * SENS;
  pitch -= e.movementY * SENS;
  pitch = Math.max(-0.55, Math.min(0.55, pitch));

});

let t3d=0;
function animate(){
  requestAnimationFrame(animate);
  t3d+=0.004;
  const euler = new THREE.Euler(pitch, yaw, 0, "YXZ");
  camera.quaternion.setFromEuler(euler);
  camera.position.y = 1.65 + Math.sin(t3d*1.2)*0.015;

  targets.forEach(t=>{
    t.position.x += t.userData.vx;
    t.position.y += t.userData.vy;
    if(t.position.x>7||t.position.x<-7) t.userData.vx*=-1;
    if(t.position.y>1.8||t.position.y<0.7) t.userData.vy*=-1;
  });

  particles3d=particles3d.filter(p=>p.life>0.05);
  particles3d.forEach(p=>{
    p.mesh.position.add(p.vel);
    p.vel.y-=0.005;
    p.life*=0.9;
    p.mesh.material.opacity=p.life;
    if(p.life<=0.05) scene.remove(p.mesh);
  });

  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize", resize);
resize();
document.getElementById("startbtn").addEventListener("click", startGame);
</script>
